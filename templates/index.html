<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DNC - Transferencia CNC</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">DNC · Transferencia CNC</div>
    <div class="usb-status" id="usbStatus">
      <span class="dot" id="usbDot"></span>
      <span id="usbLabel">Buscando adaptador...</span>
    </div>
  </header>

  <main class="columns">

    <!-- Columna izquierda: explorador de programas -->
    <section class="col col-files">
      <div class="col-header">Programas</div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="browser" id="browser"></div>
    </section>

    <!-- Columna centro: contenido del programa -->
    <section class="col col-content">
      <div class="col-header" id="contentHeader">Contenido</div>
      <pre class="content-view" id="contentView"><span class="placeholder">Toca un programa de la izquierda para ver su contenido.</span></pre>
    </section>

    <!-- Columna derecha: maquina + envio + alarma -->
    <section class="col col-action">
      <div class="col-header">Envío</div>

      <div class="alarm" id="alarm">
        <span class="alarm-icon" id="alarmIcon">⚠</span>
        <span id="alarmText">Cable RS232 no conectado</span>
      </div>

      <div class="section-label">Máquina</div>
      <div class="machine-list" id="machineList"></div>

      <div class="selected-file-card">
        <div class="section-label">Archivo seleccionado</div>
        <div class="selected-file-name" id="selectedFileName">Ninguno</div>
      </div>

      <button class="btn btn-send" id="btnSend" disabled>ENVIAR</button>
      <div class="send-hint" id="sendHint"></div>

      <div class="transfer-box" id="transferBox">
        <div class="transfer-title" id="transferTitle"></div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="transfer-detail" id="transferDetail"></div>
      </div>
    </section>

  </main>

  <!-- Modal de confirmacion de envio -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
      <h2>Confirmar envío</h2>
      <p id="confirmText"></p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btnCancelSend">Cancelar</button>
        <button class="btn btn-primary" id="btnConfirmSend">Enviar</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
