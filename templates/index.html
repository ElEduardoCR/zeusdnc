<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DNC - Transferencia CNC</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">DNC · Transferencia CNC</div>
    <div class="usb-status" id="usbStatus">
      <span class="dot" id="usbDot"></span>
      <span id="usbLabel">Buscando adaptador...</span>
    </div>
  </header>

  <main class="columns">

    <!-- Columna izquierda: explorador de programas -->
    <section class="col col-files">
      <div class="col-header">
        <span>Programas</span>
        <button class="expand-btn" id="btnExpandFiles" title="Buscar / expandir">⤢</button>
      </div>
      <div class="breadcrumb" id="breadcrumb"></div>
      <div class="browser" id="browser"></div>
    </section>

    <!-- Columna centro: editor de texto -->
    <section class="col col-content">
      <div class="editor-toolbar">
        <span class="editor-filename" id="editorFilename">Sin archivo</span>
        <div class="editor-actions">
          <button class="tbtn" id="btnNew">＋ Nuevo</button>
          <button class="tbtn" id="btnFind">🔍</button>
          <button class="tbtn" id="btnKeyboard">⌨ Teclado</button>
          <button class="tbtn expanded-only" id="btnRenumber">N° Renumerar</button>
          <button class="tbtn expanded-only" id="btnStripN">Quitar N°</button>
          <button class="tbtn expanded-only" id="btnGotoLine">Ir a línea</button>
          <button class="tbtn" id="btnSave" disabled>💾 Guardar</button>
          <button class="tbtn danger" id="btnDeleteFile" disabled>🗑</button>
          <button class="expand-btn" id="btnExpandEditor" title="Expandir editor">⤢</button>
        </div>
      </div>

      <div class="find-bar" id="findBar">
        <input type="text" id="findInput" placeholder="Buscar" autocomplete="off" spellcheck="false" inputmode="none">
        <input type="text" id="replaceInput" placeholder="Reemplazar" autocomplete="off" spellcheck="false" inputmode="none">
        <span class="find-count" id="findCount"></span>
        <button class="tbtn" id="btnFindPrev">◀</button>
        <button class="tbtn" id="btnFindNext">▶</button>
        <button class="tbtn" id="btnReplace">Reemplazar</button>
        <button class="tbtn" id="btnReplaceAll">Todo</button>
        <button class="tbtn" id="btnFindClose">✕</button>
      </div>

      <div class="editor-wrap">
        <div class="editor-gutter" id="editorGutter" aria-hidden="true"></div>
        <div class="editor-area">
          <pre class="editor-backdrop" id="editorBackdrop" aria-hidden="true"><code id="editorHighlight"></code></pre>
          <textarea class="editor" id="editor" spellcheck="false" inputmode="none"
            placeholder="Toca un programa a la izquierda para abrirlo, o crea uno con ＋ Nuevo."></textarea>
        </div>
      </div>
    </section>

    <!-- Columna derecha: maquina + envio + alarma (o teclado al editar) -->
    <section class="col col-action">

      <!-- Teclado G-code (aparece al editar/buscar, oculto por defecto) -->
      <div class="keyboard-panel" id="keyboardPanel">
        <div class="kb-header">
          <span class="kb-title">Teclado G-code</span>
          <button class="tbtn" id="btnCloseKeyboard">✕ Cerrar</button>
        </div>
        <div class="kb-target" id="kbTarget">Editando</div>
        <div class="keyboard" id="keyboard"></div>
      </div>

      <!-- Panel de envio -->
      <div id="actionPanel">
      <div class="col-header">Envío</div>

      <div class="alarm" id="alarm">
        <span class="alarm-icon" id="alarmIcon">⚠</span>
        <span id="alarmText">Cable RS232 no conectado</span>
      </div>

      <div class="section-label">Máquina</div>
      <button class="machine-select-btn" id="machineSelectBtn">
        <span id="machineSelectLabel">Seleccionar máquina</span>
        <span class="chev">▾</span>
      </button>

      <div class="selected-file-card">
        <div class="section-label">Archivo seleccionado</div>
        <div class="selected-file-name" id="selectedFileName">Ninguno</div>
      </div>

      <button class="btn btn-send" id="btnSend" disabled>ENVIAR</button>
      <div class="send-hint" id="sendHint"></div>

      <div class="transfer-box" id="transferBox">
        <div class="transfer-title" id="transferTitle"></div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="transfer-detail" id="transferDetail"></div>
      </div>
      </div><!-- /#actionPanel -->
    </section>

  </main>

  <!-- Modal: lista/administracion de maquinas -->
  <div id="machineModal" class="modal-overlay">
    <div class="modal-box wide">
      <h2>Máquinas</h2>
      <div class="machine-modal-list" id="machineModalList"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btnCloseMachineModal">Cerrar</button>
        <button class="btn btn-primary" id="btnAddMachine">＋ Agregar máquina</button>
      </div>
    </div>
  </div>

  <!-- Modal: editor de perfil de maquina -->
  <div id="machineEditModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="machineEditTitle">Nueva máquina</h2>
      <div class="form-grid">
        <label>Nombre
          <input type="text" id="mfName" autocomplete="off">
        </label>
        <label>Baudrate
          <select id="mfBaud">
            <option>300</option><option>600</option><option>1200</option>
            <option>2400</option><option>4800</option><option>9600</option>
            <option>19200</option><option>38400</option><option>57600</option>
            <option>115200</option>
          </select>
        </label>
        <label>Bits de datos
          <select id="mfBytesize">
            <option value="5">5</option><option value="6">6</option>
            <option value="7">7</option><option value="8">8</option>
          </select>
        </label>
        <label>Paridad
          <select id="mfParity">
            <option value="N">Ninguna (N)</option>
            <option value="E">Par (E)</option>
            <option value="O">Impar (O)</option>
            <option value="M">Mark (M)</option>
            <option value="S">Space (S)</option>
          </select>
        </label>
        <label>Bits de stop
          <select id="mfStop">
            <option value="1">1</option><option value="2">2</option>
          </select>
        </label>
        <label>Control de flujo
          <select id="mfFlow">
            <option value="xonxoff">XON/XOFF (software)</option>
            <option value="rtscts">RTS/CTS (hardware)</option>
          </select>
        </label>
        <label>Terminador de línea
          <select id="mfTerm">
            <option value="CR">CR (\r)</option>
            <option value="CRLF">CR+LF (\r\n)</option>
            <option value="LF">LF (\n)</option>
          </select>
        </label>
      </div>
      <div class="form-error" id="mfError"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btnCancelMachineEdit">Cancelar</button>
        <button class="btn btn-primary" id="btnSaveMachineEdit">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Modal: nuevo programa -->
  <div id="newFileModal" class="modal-overlay">
    <div class="modal-box">
      <h2>Nuevo programa</h2>
      <p class="modal-sub" id="newFileDirHint"></p>
      <input type="text" id="newFileName" placeholder="nombre.nc" autocomplete="off" spellcheck="false">
      <div class="form-error" id="newFileError"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btnCancelNewFile">Cancelar</button>
        <button class="btn btn-primary" id="btnCreateNewFile">Crear</button>
      </div>
    </div>
  </div>

  <!-- Modal generico de confirmacion -->
  <div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="confirmTitle">Confirmar</h2>
      <p id="confirmText"></p>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btnConfirmCancel">Cancelar</button>
        <button class="btn btn-primary" id="btnConfirmOk">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- Modal de busqueda de archivos (columna de archivos expandida) -->
  <div id="fileSearchModal" class="modal-overlay">
    <div class="fs-panel">
      <div class="fs-header">
        <input type="text" id="fsSearch" placeholder="Buscar archivo por nombre..." autocomplete="off" spellcheck="false" inputmode="none">
        <button class="btn btn-secondary" id="fsClose">Cerrar</button>
      </div>
      <div class="fs-hint" id="fsHint">Escribe para buscar en todas las carpetas.</div>
      <div class="fs-results" id="fsResults"></div>
    </div>
  </div>

  <!-- Modal generico de un dato (renumerar / ir a linea) -->
  <div id="promptModal" class="modal-overlay">
    <div class="modal-box">
      <h2 id="promptTitle">Dato</h2>
      <div class="prompt-fields" id="promptFields"></div>
      <div class="form-error" id="promptError"></div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="btnPromptCancel">Cancelar</button>
        <button class="btn btn-primary" id="btnPromptOk">Aceptar</button>
      </div>
    </div>
  </div>

  <!-- Teclado QWERTY flotante y arrastrable -->
  <div id="floatKeyboard" class="float-kb">
    <div class="float-kb-bar" id="floatKbBar">
      <span>Teclado — arrastra para mover</span>
      <button id="floatKbClose">✕</button>
    </div>
    <div class="float-kb-keys" id="floatKbKeys"></div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
